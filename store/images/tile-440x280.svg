<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <style>
      text { font-family: 'Google Sans', Roboto, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="#4F46E5"/>

  <!-- Subtle gradient overlay for depth -->
  <rect width="440" height="280" fill="url(#grad)" opacity="0.3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
  </defs>

  <!-- Star icon -->
  <polygon points="38,22 41.8,32 52,32.3 44.5,39 47.6,49 38,43.3 28.4,49 31.5,39 24,32.3 34.2,32" fill="white" opacity="0.95"/>

  <!-- Extension name -->
  <text x="60" y="43" fill="white" font-size="22" font-weight="700" letter-spacing="-0.3">GMB Review AI</text>

  <!-- Tagline -->
  <text x="32" y="66" fill="white" font-size="13" opacity="0.8">AI replies for Google Business Profile reviews</text>

  <!-- Divider line -->
  <line x1="32" y1="78" x2="408" y2="78" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Mock review card - white card -->
  <rect x="32" y="88" width="376" height="110" rx="10" fill="white" opacity="0.97"/>

  <!-- Card header - reviewer name -->
  <circle cx="54" cy="108" r="12" fill="#E0E7FF"/>
  <text x="54" y="113" fill="#4F46E5" font-size="11" font-weight="700" text-anchor="middle">SA</text>
  <text x="74" y="106" fill="#1A1D23" font-size="13" font-weight="700">Sarah Ahmed</text>
  <text x="74" y="119" fill="#9CA3AF" font-size="10">2 days ago</text>

  <!-- Star rating - 5 stars -->
  <text x="280" y="111" fill="#FBBF24" font-size="14">★★★★★</text>

  <!-- Review text -->
  <text x="48" y="140" fill="#374151" font-size="11">Amazing experience! The team was incredibly professional</text>
  <text x="48" y="154" fill="#374151" font-size="11">and made me feel so welcome. Highly recommended!</text>

  <!-- AI reply badge -->
  <rect x="48" y="163" width="76" height="18" rx="9" fill="#EEF2FF"/>
  <text x="86" y="175" fill="#4F46E5" font-size="10" font-weight="600" text-anchor="middle">✦ AI Reply Ready</text>

  <!-- Reply preview -->
  <text x="140" y="175" fill="#4F46E5" font-size="10" font-style="italic">"Dear Sarah, thank you for choosing us!..."</text>

  <!-- Feature pills row -->
  <!-- Pill 1 -->
  <rect x="32" y="213" width="110" height="30" rx="15" fill="white" opacity="0.18"/>
  <text x="87" y="232" fill="white" font-size="12" font-weight="600" text-anchor="middle">Multi-Profile</text>

  <!-- Pill 2 -->
  <rect x="155" y="213" width="130" height="30" rx="15" fill="white" opacity="0.18"/>
  <text x="220" y="232" fill="white" font-size="12" font-weight="600" text-anchor="middle">Bulk Reply All</text>

  <!-- Pill 3 -->
  <rect x="298" y="213" width="110" height="30" rx="15" fill="white" opacity="0.18"/>
  <text x="353" y="232" fill="white" font-size="12" font-weight="600" text-anchor="middle">100% Free</text>

  <!-- Bottom tagline -->
  <text x="220" y="264" fill="white" font-size="11" opacity="0.6" text-anchor="middle">Powered by Gemini 2.5 Flash · No subscription · No data collection</text>
</svg>
