  <!-- Panel review card 1 (replied) -->
  <rect x="1148" y="218" width="204" height="56" rx="6" fill="#F9FAFB"/>
  <text x="1158" y="232" fill="#1A1D23" font-size="10" font-weight="700">Amna Raza</text>
  <text x="1230" y="232" fill="#FBBF24" font-size="9">★★★★★</text>
  <rect x="1157" y="237" width="52" height="12" rx="6" fill="#DDD6FE"/>
  <text x="1183" y="247" fill="#5B21B6" font-size="8" text-anchor="middle">Serenity Spa</text>
  <text x="1158" y="257" fill="#6B7280" font-size="9">Amazing service, love this place!</text>
  <rect x="1158" y="263" width="40" height="12" rx="6" fill="#D1FAE5"/>
  <text x="1178" y="272" fill="#059669" font-size="8" text-anchor="middle">✓ Posted</text>

  <!-- Panel review card 2 (active - generating) -->
  <rect x="1148" y="282" width="204" height="56" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1"/>
  <text x="1158" y="296" fill="#1A1D23" font-size="10" font-weight="700">Bilal Khan</text>
  <text x="1230" y="296" fill="#FBBF24" font-size="9">★★★★</text>
  <rect x="1157" y="301" width="52" height="12" rx="6" fill="#DDD6FE"/>
  <text x="1183" y="311" fill="#5B21B6" font-size="8" text-anchor="middle">House of Salons</text>
  <text x="1158" y="321" fill="#6B7280" font-size="9">Great haircut, very professional...</text>
  <rect x="1158" y="327" width="64" height="12" rx="6" fill="#4F46E5"/>
  <text x="1190" y="336" fill="white" font-size="8" text-anchor="middle">⬡ Generating...</text>

  <!-- Panel review card 3 (pending) -->
  <rect x="1148" y="346" width="204" height="56" rx="6" fill="#F9FAFB"/>
  <text x="1158" y="360" fill="#1A1D23" font-size="10" font-weight="700">Sara Malik</text>
  <text x="1230" y="360" fill="#FBBF24" font-size="9">★★★★★</text>
  <rect x="1157" y="365" width="52" height="12" rx="6" fill="#DDD6FE"/>
  <text x="1183" y="375" fill="#5B21B6" font-size="8" text-anchor="middle">Serenity Spa</text>
  <text x="1158" y="385" fill="#6B7280" font-size="9">Best spa in Islamabad by far!</text>
  <rect x="1158" y="391" width="46" height="12" rx="6" fill="#E5E7EB"/>
  <text x="1181" y="400" fill="#6B7280" font-size="8" text-anchor="middle">Generate</text>

  <!-- ══ Bottom CTA text ══ -->
  <text x="80" y="500" fill="white" font-size="18" font-weight="700" opacity="0.9">Free to install · Bring your own Gemini API key · Start replying in 2 minutes</text>
</svg>
