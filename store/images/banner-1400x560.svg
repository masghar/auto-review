  <text x="1194" y="186" fill="white" font-size="10" font-weight="600" text-anchor="middle">Scan Reviews</text>
  <rect x="1248" y="170" width="72" height="24" rx="6" fill="#EEF2FF"/>
  <text x="1284" y="186" fill="#4F46E5" font-size="10" font-weight="600" text-anchor="middle">Reply All</text>

  <!-- Status bar -->
